<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Cookie max lifetime</title>
    <style>
      body {
        min-width: 420px;
        padding: 16px;
      }
      div.field-label {
        margin-bottom: 4px;
      }
      input[type="number"] {
        width: 120px;
      }
    </style>
  </head>
  <body>
    <form>
      <div style="line-height: 1.4; font-size: 20px;">
        <p>
          <div class="field-label">Max cookie lifetime in hours:</div>
          <input type="number" id="maxLifetime">
        </p>

        <p>
          <div class="field-label">Exceptions:</div>
          <textarea id="exceptions" cols="50" rows="5"></textarea>
        </p>

        <p>
          <div class="field-label">Local storage max lifetime in hours:</div>
          <input type="number" id="localStorageMaxLifetime">
        </p>

        <p>
          <div class="field-label">Local storage exceptions:</div>
          <textarea id="localStorageExceptions" cols="50" rows="5"></textarea>
        </p>

        <p>
          <button type="submit" id="saveButton" disabled>Save</button>
        </p>
      </div>
    </form>
    <script src="options.js"></script>
  </body>
</html>
